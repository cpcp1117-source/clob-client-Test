# ============================== Filebeat Configuration ==============================

filebeat.inputs:
- type: log
  enabled: true
  paths:
    # ⚠️ 請根據實際路徑修改
    - 'd:\coreator\clob-client-Test\logs\*.json.log'
  json.keys_under_root: true
  json.overwrite_keys: true

# ================================= Output =====================================

output.elasticsearch:
  hosts: ["localhost:9200"]
  # 本地測試簡化：不使用 SSL/TLS (與 docker-compose 配套)
  protocol: "http"

# ================================= Processors =================================
processors:
  - add_host_metadata: ~
  - add_cloud_metadata: ~
